const colors={"九州電力":"#c43d4b","九州":"#c43d4b","東北電力":"#2563aa","東北":"#2563aa","東京電力":"#6b4bb7","東京":"#6b4bb7","関西電力":"#21865f","関西":"#21865f","中部電力":"#9a6214","中部":"#9a6214","四国電力":"#0f7e8b","四国":"#0f7e8b"};
function fm(m){return m.replace("-","/")}
function fv(v){if(v==null)return"未取得";return`${v<0?"▲":""}${Math.abs(v).toFixed(2)} 円/kWh`}
function visibleMonths(data,period){return period.value==="all"?data.months:data.months.slice(-Number(period.value))}
function bounds(vals,zero){if(!vals.length)return{min:-1,max:1,step:1};let min=zero?Math.min(...vals,0):Math.min(...vals),max=zero?Math.max(...vals,0):Math.max(...vals);if(min===max){min-=1;max+=1}const raw=(max-min)/5,mag=10**Math.floor(Math.log10(raw)),r=raw/mag,step=(r<=1?1:r<=2?2:r<=5?5:10)*mag;return{min:Math.floor(min/step)*step,max:Math.ceil(max/step)*step,step}}
function makeChart(cfg){const active=new Set(cfg.data.names),points=[];function renderLegend(){cfg.legend.innerHTML=cfg.data.names.map(n=>`<label><input type="checkbox" value="${n}" checked><span class="sw" style="background:${colors[n]}"></span>${n}</label>`).join("");cfg.legend.querySelectorAll("input").forEach(i=>i.onchange=()=>{i.checked?active.add(i.value):active.delete(i.value);draw()})}function setAll(on){cfg.legend.querySelectorAll("input").forEach(i=>{i.checked=on;on?active.add(i.value):active.delete(i.value)});draw()}function draw(){const c=cfg.canvas,dpr=devicePixelRatio||1,w=Math.max(320,c.parentElement.clientWidth),h=c.clientHeight||410;c.width=w*dpr;c.height=h*dpr;const x=c.getContext("2d");x.setTransform(dpr,0,0,dpr,0,0);x.clearRect(0,0,w,h);points.length=0;const compact=w<520,m={t:22,r:compact?14:24,b:compact?82:52,l:compact?44:66},pw=w-m.l-m.r,ph=h-m.t-m.b,ms=visibleMonths(cfg.data,cfg.period),mi=cfg.data.months.length-ms.length;const vals=[];cfg.data.names.forEach(n=>active.has(n)&&cfg.data.series[n].slice(mi).forEach(v=>v!=null&&vals.push(v)));const b=bounds(vals,cfg.zero),xat=i=>m.l+(ms.length===1?pw/2:pw*i/(ms.length-1)),yat=v=>m.t+(b.max-v)/(b.max-b.min)*ph;x.font="12px sans-serif";x.lineWidth=1;x.strokeStyle="#d9dee7";x.fillStyle="#637083";x.textAlign="right";x.textBaseline="middle";for(let y=b.min;y<=b.max+b.step/2;y+=b.step){let py=yat(y);x.beginPath();x.moveTo(m.l,py);x.lineTo(w-m.r,py);x.stroke();x.fillText(y.toFixed(Math.abs(b.step)<1?1:0),m.l-7,py)}x.strokeStyle="#aeb9c8";x.beginPath();x.moveTo(m.l,m.t);x.lineTo(m.l,h-m.b);x.lineTo(w-m.r,h-m.b);x.stroke();x.textBaseline="top";const ls=compact?(ms.length<=6?1:ms.length<=12?4:6):(ms.length<=6?1:ms.length<=12?2:3),gap=compact?72:46;let labs=[];ms.forEach((mo,i)=>{if(i%ls===0||i===ms.length-1)labs.push(i)});let drawn=[];labs.forEach(i=>{const xx=xat(i);if(drawn.length&&xx-drawn[drawn.length-1].x<gap){if(i===ms.length-1)drawn.pop();else return}drawn.push({i,x:xx})});drawn.forEach(o=>{x.fillStyle="#637083";x.textAlign=o.i===0?"left":o.i===ms.length-1?"right":"center";if(compact){x.save();x.translate(o.x,h-m.b+28);x.rotate(-Math.PI/5);x.fillText(fm(ms[o.i]),0,0);x.restore()}else x.fillText(fm(ms[o.i]),o.x,h-m.b+12)});cfg.data.names.forEach(n=>{if(!active.has(n))return;const arr=cfg.data.series[n].slice(mi),col=colors[n];x.strokeStyle=col;x.fillStyle=col;x.lineWidth=2.3;x.beginPath();let on=false;arr.forEach((v,i)=>{if(v==null){if(on)x.stroke();on=false;x.beginPath();return}const px=xat(i),py=yat(v);on?x.lineTo(px,py):(x.moveTo(px,py),on=true);points.push({x:px,y:py,name:n,month:ms[i],value:v})});if(on)x.stroke();arr.forEach((v,i)=>{if(v==null)return;x.beginPath();x.arc(xat(i),yat(v),3,0,Math.PI*2);x.fill();x.strokeStyle="#fff";x.lineWidth=1;x.stroke();x.strokeStyle=col})});let note=`表示期間: ${fm(ms[0])}〜${fm(ms[ms.length-1])}`;if(cfg.extraFoot)note+=cfg.extraFoot(ms);cfg.foot.textContent=note}cfg.canvas.onmousemove=e=>{const r=cfg.canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;let n=null,bd=1e9;points.forEach(p=>{const d=Math.hypot(p.x-mx,p.y-my);if(d<bd){bd=d;n=p}});if(!n||bd>14){cfg.tip.style.display="none";return}cfg.tip.style.display="block";cfg.tip.style.left=Math.min(n.x,r.width-260)+"px";cfg.tip.style.top=n.y+"px";cfg.tip.innerHTML=`<strong>${n.name} ${fm(n.month)}</strong>${fv(n.value)}`};cfg.canvas.onmouseleave=()=>cfg.tip.style.display="none";cfg.period.onchange=draw;renderLegend();draw();return{draw,setAll}}
const fuelChart=makeChart({data:FUEL,canvas:document.getElementById("fuelChart"),legend:document.getElementById("fuelLegend"),tip:document.getElementById("fuelTip"),foot:document.getElementById("fuelFoot"),period:document.getElementById("fuelPeriod"),zero:true});

document.querySelectorAll("button[data-chart]").forEach(b=>b.onclick=()=>{(b.dataset.chart==="fuel"?fuelChart:marketChart).setAll(b.dataset.action==="all")});
addEventListener("resize",()=>{fuelChart.draw();marketChart.draw()});
document.getElementById("rows").innerHTML=FUEL.names.map(co=>{let arr=FUEL.series[co],idx=arr.map((v,i)=>v!=null?i:-1).filter(i=>i>=0).pop();return`<tr><td><strong>${co}</strong></td><td class="val">${fv(arr[idx])}</td><td>${fm(FUEL.months[idx])}</td></tr>`}).join("");
</script>
