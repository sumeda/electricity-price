<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>燃料費等調整単価ビューア</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f6f7f9;color:#17212b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}header{background:#17324d;color:#fff;padding:22px clamp(14px,4vw,38px);border-bottom:4px solid #d9a441}h1{margin:0 0 8px;font-size:clamp(23px,4vw,36px);line-height:1.2}header p{margin:0;color:#dce6ef;line-height:1.6}main{width:min(1120px,calc(100% - 24px));margin:18px auto 36px}.panel,.table{background:#fff;border:1px solid #d9dee7;border-radius:8px;box-shadow:0 10px 30px rgba(28,43,64,.08)}.panel{padding:14px;margin-bottom:14px}.head{display:flex;gap:14px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap}h2{margin:0 0 6px;font-size:18px}.muted{color:#637083;font-size:13px;line-height:1.55}.controls,.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center}select,button{min-height:34px;border:1px solid #d9dee7;border-radius:6px;background:#fff;color:#17212b;font-weight:700;padding:0 10px}button{background:#f8fafc;cursor:pointer}label{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;border:1px solid #d9dee7;border-radius:6px;padding:5px 8px;background:#fbfcfe}.sw{width:10px;height:10px;border-radius:50%}.wrap{position:relative;min-height:340px}canvas{display:block;width:100%;height:410px}.tip{display:none;position:absolute;max-width:240px;transform:translate(12px,-50%);border:1px solid #d9dee7;border-radius:8px;background:rgba(255,255,255,.97);box-shadow:0 12px 28px rgba(20,32,48,.16);padding:8px 10px;font-size:12px;line-height:1.5;pointer-events:none}.foot{margin-top:8px;color:#637083;font-size:12px}.table{overflow:visible}table{width:100%;border-collapse:collapse;table-layout:fixed}th,td{padding:12px 13px;border-bottom:1px solid #d9dee7;text-align:left;font-size:14px;word-break:keep-all}th{background:#eef2f6;color:#435063;white-space:normal}.val{font-weight:800;font-size:17px;color:#21745b;font-variant-numeric:tabular-nums;white-space:normal}@media(max-width:760px){canvas{height:350px}th,td{padding:10px 8px;font-size:12px}.val{font-size:14px}}
</style>
</head>
<body>
<header><h1>燃料費等調整単価ビューア</h1><p>九州・東北・関西・中部・東京・四国電力の特別高圧向け燃料費等調整単価を表示します。</p></header>
<main>
<section class="panel">
<div class="head"><div><h2>月次推移</h2><div class="muted">会社ごとのチェックで表示を切り替えられます。</div></div><div class="controls"><span class="muted">表示期間</span><select id="period"><option value="3">直近3ヶ月</option><option value="6">直近6ヶ月</option><option value="12" selected>直近1年</option><option value="24">直近2年</option></select><button id="all">すべて表示</button><button id="none">すべて解除</button></div></div>
<div id="legend" class="legend"></div>
<div class="wrap"><canvas id="chart"></canvas><div id="tip" class="tip"></div></div>
<div id="foot" class="foot"></div>
</section>
<section class="table"><table><thead><tr><th>会社</th><th>特別高圧 1kWhあたり</th><th>最新取得月</th></tr></thead><tbody id="rows"></tbody></table></section>
</main>
<script>
const DATA={"months":["2024-04","2024-05","2024-06","2024-07","2024-08","2024-09","2024-10","2024-11","2024-12","2025-01","2025-02","2025-03","2025-04","2025-05","2025-06","2025-07","2025-08","2025-09","2025-10","2025-11","2025-12","2026-01","2026-02","2026-03","2026-04","2026-05","2026-06","2026-07","2026-08"],"companies":["九州電力","東北電力","東京電力","関西電力","中部電力","四国電力"],"series":{"九州電力":[-0.04,-0.06,-0.12,-0.2,-0.28,-0.28,-0.24,-0.25,-0.35,-0.44,-0.43,-0.36,-0.28,-0.35,-0.47,-0.74,-0.93,-1.07,-1.13,-1.11,-1.11,-1.08,-1.08,-1.02,-0.96,-0.92,-0.89,-0.83,-0.63],"東北電力":[null,null,null,null,-8.42,-8.42,-8.15,-7.97,-8.0,-8.06,-9.08,-9.05,-7.89,-7.98,-8.27,-8.96,-9.56,-9.85,-9.85,-9.67,-9.65,-9.65,-9.77,-9.66,-0.08,0.23,0.11,0.73,0.93],"東京電力":[null,null,null,null,-1.05,-1.1,-0.93,-0.91,-1.06,-1.23,-1.22,-1.06,0.26,0.15,-0.06,-0.57,-0.94,-1.18,-1.33,-1.35,-1.37,-1.39,-1.39,-1.26,-0.1,0.07,0.87,1.44,null],"関西電力":[-0.05,-0.06,-0.15,-0.23,-0.32,-0.33,-0.27,-0.28,-0.39,-0.49,-0.47,-0.39,-0.3,-0.38,-0.51,-0.81,-1.02,-1.17,-1.24,-1.23,-1.22,-1.19,-1.19,-1.12,-1.06,-1.02,-0.98,-0.91,-0.69],"中部電力":[null,null,null,null,null,0.69,0.26,0.07,0.12,0.18,0.26,0.12,0.95,0.89,0.63,0.08,0.7,0.98,0.93,0.76,0.77,0.9,0.98,0.89,0.34,0.12,1.45,1.92,3.7],"四国電力":[-5.42,-5.52,-5.64,-5.66,-5.72,-5.67,-5.61,-5.67,-5.87,-6.05,-6.06,-5.97,-5.9,-5.99,-6.18,-6.57,-6.89,-7.13,-7.26,-7.22,-7.17,-7.08,-7.07,-6.99,-6.93,-6.89,-6.86,-6.69,-6.26]}};
const colors={"九州電力":"#c43d4b","東北電力":"#2563aa","関西電力":"#21865f","中部電力":"#9a6214","東京電力":"#6b4bb7","四国電力":"#0f7e8b"};
const active=new Set(DATA.companies),points=[];const c=document.getElementById("chart"),tip=document.getElementById("tip"),period=document.getElementById("period");
function fm(m){return m.replace("-","/")}function fv(v){if(v==null)return"未取得";return`${v<0?"▲":""}${Math.abs(v).toFixed(2)} 円/kWh`}function months(){return DATA.months.slice(-Number(period.value))}
function bounds(vals){if(!vals.length)return{min:-1,max:1,step:1};let min=Math.min(...vals,0),max=Math.max(...vals,0);if(min===max){min-=1;max+=1}const raw=(max-min)/5,mag=10**Math.floor(Math.log10(raw)),r=raw/mag,step=(r<=1?1:r<=2?2:r<=5?5:10)*mag;return{min:Math.floor(min/step)*step,max:Math.ceil(max/step)*step,step}}
function draw(){const dpr=devicePixelRatio||1,w=Math.max(320,c.parentElement.clientWidth),h=c.clientHeight||410;c.width=w*dpr;c.height=h*dpr;const x=c.getContext("2d");x.setTransform(dpr,0,0,dpr,0,0);x.clearRect(0,0,w,h);points.length=0;const m={t:22,r:24,b:52,l:66},pw=w-m.l-m.r,ph=h-m.t-m.b,ms=months(),mi=DATA.months.length-ms.length;const vals=[];DATA.companies.forEach(co=>active.has(co)&&DATA.series[co].slice(mi).forEach(v=>v!=null&&vals.push(v)));const b=bounds(vals),xat=i=>m.l+(ms.length===1?pw/2:pw*i/(ms.length-1)),yat=v=>m.t+(b.max-v)/(b.max-b.min)*ph;x.font="12px sans-serif";x.lineWidth=1;x.strokeStyle="#d9dee7";x.fillStyle="#637083";x.textAlign="right";x.textBaseline="middle";for(let y=b.min;y<=b.max+b.step/2;y+=b.step){let py=yat(y);x.beginPath();x.moveTo(m.l,py);x.lineTo(w-m.r,py);x.stroke();x.fillText(y.toFixed(Math.abs(b.step)<1?1:0),m.l-9,py)}x.strokeStyle="#aeb9c8";x.beginPath();x.moveTo(m.l,m.t);x.lineTo(m.l,h-m.b);x.lineTo(w-m.r,h-m.b);x.stroke();x.textBaseline="top";const ls=w<520?(ms.length<=6?1:ms.length<=12?3:4):(ms.length<=6?1:ms.length<=12?2:3),gap=w<520?56:46;let labs=[];ms.forEach((mo,i)=>{if(i%ls===0||i===ms.length-1)labs.push(i)});if(labs[labs.length-1]!==ms.length-1)labs.push(ms.length-1);let drawn=[];labs.forEach(i=>{const xx=xat(i);if(drawn.length&&xx-drawn[drawn.length-1].x<gap){if(i===ms.length-1)drawn.pop();else return}drawn.push({i,x:xx})});drawn.forEach(o=>{x.fillStyle="#637083";x.textAlign=o.i===0?"left":o.i===ms.length-1?"right":"center";x.fillText(fm(ms[o.i]),o.x,h-m.b+12)});DATA.companies.forEach(co=>{if(!active.has(co))return;const arr=DATA.series[co].slice(mi),col=colors[co];x.strokeStyle=col;x.fillStyle=col;x.lineWidth=2.3;x.beginPath();let on=false;arr.forEach((v,i)=>{if(v==null){if(on)x.stroke();on=false;x.beginPath();return}const px=xat(i),py=yat(v);on?x.lineTo(px,py):(x.moveTo(px,py),on=true);points.push({x:px,y:py,company:co,month:ms[i],value:v})});if(on)x.stroke();arr.forEach((v,i)=>{if(v==null)return;x.beginPath();x.arc(xat(i),yat(v),3,0,Math.PI*2);x.fill();x.strokeStyle="#fff";x.lineWidth=1;x.stroke();x.strokeStyle=col})});document.getElementById("foot").textContent=`表示期間: ${fm(ms[0])}〜${fm(ms[ms.length-1])}`}
function renderLegend(){document.getElementById("legend").innerHTML=DATA.companies.map(co=>`<label><input type="checkbox" value="${co}" checked><span class="sw" style="background:${colors[co]}"></span>${co}</label>`).join("");document.querySelectorAll("#legend input").forEach(i=>i.onchange=()=>{i.checked?active.add(i.value):active.delete(i.value);draw()})}
function renderRows(){document.getElementById("rows").innerHTML=DATA.companies.map(co=>{let arr=DATA.series[co],idx=arr.map((v,i)=>v!=null?i:-1).filter(i=>i>=0).pop();return`<tr><td><strong>${co}</strong></td><td class="val">${fv(arr[idx])}</td><td>${fm(DATA.months[idx])}</td></tr>`}).join("")}
c.onmousemove=e=>{const r=c.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;let n=null,bd=1e9;points.forEach(p=>{const d=Math.hypot(p.x-mx,p.y-my);if(d<bd){bd=d;n=p}});if(!n||bd>14){tip.style.display="none";return}tip.style.display="block";tip.style.left=Math.min(n.x,r.width-250)+"px";tip.style.top=n.y+"px";tip.innerHTML=`<strong>${n.company} ${fm(n.month)}</strong>${fv(n.value)}`};c.onmouseleave=()=>tip.style.display="none";period.onchange=draw;document.getElementById("all").onclick=()=>{document.querySelectorAll("#legend input").forEach(i=>{i.checked=true;active.add(i.value)});draw()};document.getElementById("none").onclick=()=>{document.querySelectorAll("#legend input").forEach(i=>{i.checked=false;active.delete(i.value)});draw()};addEventListener("resize",draw);renderLegend();renderRows();draw();
</script>
</body>
</html>
